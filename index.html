<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
  <meta name="theme-color" content="#090909" />
  <meta name="description" content="BefitAfrica — Africa's No. 1 Fitness NGO. Fit to Lead. A community fitness platform with live GPS tracking, attendance, health monitoring and hub community for members across Lagos and beyond." />
  <title>BefitAfrica — Fit to Lead</title>
  <link rel="icon" type="image/png" href="bfa-logo.png" />
  <link rel="apple-touch-icon" href="bfa-logo.png" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:#090909;color:#fff;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow-x:hidden;}
    #root{min-height:100vh;}
    ::-webkit-scrollbar{width:8px;height:8px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:rgba(128,128,128,0.35);border-radius:8px;}
    ::-webkit-scrollbar-thumb:hover{background:rgba(128,128,128,0.55);}
    input,select,textarea,button{font-family:inherit;}
    select option{background:#111;color:#fff;}
    /* Animations */
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
    @keyframes pulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.08);opacity:0.6;}}
    @keyframes slideR{from{opacity:0;transform:translateX(28px);}to{opacity:1;transform:translateX(0);}}
    @keyframes slideU{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
    @keyframes bpm{0%,100%{transform:scale(1);}14%{transform:scale(1.18);}28%{transform:scale(1);}42%{transform:scale(1.12);}}
    @keyframes ping{0%{transform:scale(1);opacity:0.8;}100%{transform:scale(2.4);opacity:0;}}
    @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
    @keyframes breathe{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
    .fd{animation:fadeIn 0.4s ease both;}
    .sl{animation:slideR 0.32s cubic-bezier(0.16,1,0.3,1) both;}
    .su{animation:slideU 0.34s cubic-bezier(0.16,1,0.3,1) both;}
    .hb{animation:bpm 1.4s ease-in-out infinite;}
    @media (max-width:760px){body{font-size:15px;}}
    /* Keep Leaflet panes/controls beneath the app's modals (which use z-index >= 900) */
    .leaflet-container{background:#0c1b2c;font-family:inherit;}
    .leaflet-pane,.leaflet-top,.leaflet-bottom{z-index:400 !important;}
    .leaflet-control-attribution{font-size:9px;}
    /* Realistic animated athlete avatar (current-location marker) */
    .bfaAvatarWrap{background:none !important;border:none !important;}
    .bfaAvatar svg{overflow:visible;}
    .bfaAvatar g{transform-box:fill-box;}
    /* pivots */
    .bfaThighF,.bfaThighB{transform-origin:50% 0%;}
    .bfaShinF,.bfaShinB{transform-origin:50% 0%;}
    .bfaUpArmF,.bfaUpArmB{transform-origin:50% 0%;}
    .bfaForeF,.bfaForeB{transform-origin:50% 0%;}
    .bfaHead{transform-origin:50% 100%;}

    /* RUN gait — fast, big strides, knee/elbow bend, vertical bob */
    .bfaRun .bfaAvatar,.bfaRun{}
    .bfaRun .bfaThighF{animation:thighF .62s ease-in-out infinite;}
    .bfaRun .bfaThighB{animation:thighB .62s ease-in-out infinite;}
    .bfaRun .bfaShinF{animation:shinF .62s ease-in-out infinite;}
    .bfaRun .bfaShinB{animation:shinB .62s ease-in-out infinite;}
    .bfaRun .bfaUpArmF{animation:armF .62s ease-in-out infinite;}
    .bfaRun .bfaUpArmB{animation:armB .62s ease-in-out infinite;}
    .bfaRun .bfaForeF{animation:foreBend .62s ease-in-out infinite;}
    .bfaRun .bfaForeB{animation:foreBend .62s ease-in-out infinite;}
    .bfaRun .bfaHead{animation:bob .62s ease-in-out infinite;}

    /* WALK gait — slower, smaller strides, near-straight knees */
    .bfaWalk .bfaThighF{animation:thighFw 1s ease-in-out infinite;}
    .bfaWalk .bfaThighB{animation:thighBw 1s ease-in-out infinite;}
    .bfaWalk .bfaShinF{animation:shinFw 1s ease-in-out infinite;}
    .bfaWalk .bfaShinB{animation:shinBw 1s ease-in-out infinite;}
    .bfaWalk .bfaUpArmF{animation:armFw 1s ease-in-out infinite;}
    .bfaWalk .bfaUpArmB{animation:armBw 1s ease-in-out infinite;}
    .bfaWalk .bfaHead{animation:bobS 1s ease-in-out infinite;}

    /* RUN keyframes */
    @keyframes thighF{0%{transform:rotate(-38deg);}50%{transform:rotate(34deg);}100%{transform:rotate(-38deg);}}
    @keyframes thighB{0%{transform:rotate(34deg);}50%{transform:rotate(-38deg);}100%{transform:rotate(34deg);}}
    @keyframes shinF{0%{transform:rotate(10deg);}25%{transform:rotate(70deg);}50%{transform:rotate(8deg);}75%{transform:rotate(2deg);}100%{transform:rotate(10deg);}}
    @keyframes shinB{0%{transform:rotate(8deg);}25%{transform:rotate(2deg);}50%{transform:rotate(10deg);}75%{transform:rotate(70deg);}100%{transform:rotate(8deg);}}
    @keyframes armF{0%{transform:rotate(42deg);}50%{transform:rotate(-32deg);}100%{transform:rotate(42deg);}}
    @keyframes armB{0%{transform:rotate(-32deg);}50%{transform:rotate(42deg);}100%{transform:rotate(-32deg);}}
    @keyframes foreBend{0%,100%{transform:rotate(-55deg);}50%{transform:rotate(-70deg);}}
    @keyframes bob{0%,100%{transform:translateY(0);}25%{transform:translateY(-2.5px);}50%{transform:translateY(0);}75%{transform:translateY(-2.5px);}}

    /* WALK keyframes */
    @keyframes thighFw{0%{transform:rotate(-22deg);}50%{transform:rotate(20deg);}100%{transform:rotate(-22deg);}}
    @keyframes thighBw{0%{transform:rotate(20deg);}50%{transform:rotate(-22deg);}100%{transform:rotate(20deg);}}
    @keyframes shinFw{0%{transform:rotate(4deg);}30%{transform:rotate(36deg);}60%{transform:rotate(2deg);}100%{transform:rotate(4deg);}}
    @keyframes shinBw{0%{transform:rotate(2deg);}30%{transform:rotate(4deg);}60%{transform:rotate(36deg);}100%{transform:rotate(2deg);}}
    @keyframes armFw{0%{transform:rotate(20deg);}50%{transform:rotate(-18deg);}100%{transform:rotate(20deg);}}
    @keyframes armBw{0%{transform:rotate(-18deg);}50%{transform:rotate(20deg);}100%{transform:rotate(-18deg);}}
    @keyframes bobS{0%,100%{transform:translateY(0);}50%{transform:translateY(-1.5px);}}
  </style>
</head>
<body>
  <div id="root"></div>
  <!-- React 18 (production UMD) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <!-- Supabase client (cloud backend) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Data layer must load before the app -->
  <script src="data.js"></script>
  <!-- Cloud overrides: comment out the next line to revert to local-only storage -->
  <script src="data-supabase.js"></script>
  <script src="app.js"></script>
</body>
</html>
